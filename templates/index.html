<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCO Optimizer - Video Predictor</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #00ff88;
            --dark: #1a1a2e;
            --card: #16213e;
            --text: #eaeaea;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin-top: 50px;
            margin-bottom: 50px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
        }

        .analyzer-box {
            background-color: var(--card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            border: 1px solid #2a3b55;
        }

        .section-title {
            font-size: 1.1rem;
            color: var(--accent);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: var(--primary);
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 14px;
            background: #0f3460;
            border: 2px solid #0f3460;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* File Upload Styling */
        .file-upload {
            border: 2px dashed var(--primary);
            padding: 30px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(15, 52, 96, 0.5);
        }

        .file-upload:hover {
            background: #1a4a80;
            border-color: var(--accent);
        }

        input[type="file"] {
            display: none;
        }

        .upload-label {
            cursor: pointer;
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1rem;
        }

        #videoPreview {
            margin-top: 10px;
            color: var(--accent);
            font-size: 0.9rem;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #resultArea {
            margin-top: 30px;
            display: none;
            border-top: 2px solid #333;
            padding-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .score-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .score-circle {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 8px solid var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a2a4a 0%, #16213e 100%);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        .score-number {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--primary);
        }

        .score-label {
            font-size: 0.8rem;
            color: #888;
            text-transform: uppercase;
        }

        .verdict {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: #fff;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
        }

        .feedback-list {
            list-style: none;
            padding: 0;
        }

        .feedback-list li {
            background: linear-gradient(90deg, #0f3460, #16213e);
            margin-bottom: 12px;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            transition: transform 0.2s;
        }

        .feedback-list li:hover {
            transform: translateX(5px);
        }

        .video-stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            background: #0f3460;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.95rem;
            color: #aaa;
        }

        .stat-item span {
            color: var(--accent);
            font-weight: bold;
        }

        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 5px;
            background: var(--secondary);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🚀 SCO OPTIMIZER</h1>
            <p class="subtitle">AI-Powered YouTube Video & SEO Performance Predictor</p>
        </header>

        <div class="analyzer-box">
            <!-- Text Analysis Section -->
            <div class="section-title">📝 Text Analysis</div>
            
            <div class="input-group">
                <label>Video Title</label>
                <input type="text" id="title" placeholder="e.g., How to make money in 2024 - Complete Guide">
            </div>
            
            <div class="input-group">
                <label>Description</label>
                <textarea id="description" rows="5" placeholder="Describe your video content in detail for better SEO..."></textarea>
            </div>

            <div class="input-group">
                <label>Tags (Comma separated)</label>
                <input type="text" id="tags" placeholder="money, tutorial, finance, 2024, how to">
            </div>

            <hr style="border-color: #333; margin: 30px 0;">

            <!-- Video Analysis Section -->
            <div class="section-title">🎥 Video Analysis</div>
            
            <div class="input-group">
                <div class="file-upload" onclick="document.getElementById('videoInput').click()">
                    <label for="videoInput" class="upload-label">
                        📂 Click to Upload Video File
                    </label>
                    <input type="file" id="videoInput" accept="video/*">
                    <div id="videoPreview">No video selected (MP4, MOV, AVI supported)</div>
                </div>
            </div>

            <button onclick="analyzeVideo()">✨ RUN FULL ANALYSIS</button>

            <div id="resultArea">
                <div id="videoStatsBox" class="video-stats" style="display:none;">
                    <div class="stat-item">📹 Duration: <span id="vDuration">-</span></div>
                    <div class="stat-item">🎬 Resolution: <span id="vRes">-</span></div>
                </div>
                
                <div class="score-container">
                    <div class="score-circle">
                        <span class="score-number" id="scoreDisplay">0</span>
                        <span class="score-label">Score</span>
                    </div>
                </div>
                
                <div class="verdict" id="verdictDisplay">Waiting...</div>
                
                <ul class="feedback-list" id="feedbackList"></ul>
            </div>
        </div>
    </div>

    <script>
        // Preview Video Name
        document.getElementById('videoInput').addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                const file = e.target.files[0];
                const sizeMB = (file.size / (1024 * 1024)).toFixed(2);
                document.getElementById('videoPreview').innerText = `✅ Selected: ${file.name} (${sizeMB} MB)`;
            }
        });

        async function analyzeVideo() {
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const tags = document.getElementById('tags').value;
            const videoFile = document.getElementById('videoInput').files[0];

            if(!title && !videoFile) {
                alert("Please enter a title or upload a video.");
                return;
            }

            const btn = document.querySelector('button');
            btn.innerText = "Analyzing with AI...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('title', title);
            formData.append('description', description);
            formData.append('tags', tags);
            if(videoFile) {
                formData.append('video', videoFile);
            }

            const response = await fetch('/analyze', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            // Update UI
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('scoreDisplay').innerText = data.score;
            document.getElementById('verdictDisplay').innerText = data.verdict;
            
            // Show video stats if exists
            if(data.video_info) {
                document.getElementById('videoStatsBox').style.display = 'flex';
                const duration = data.video_info.duration;
                document.getElementById('vDuration').innerText = Math.floor(duration / 60) + "m " + (duration % 60) + "s";
                document.getElementById('vRes').innerText = data.video_info.resolution + "p";
            }

            const list = document.getElementById('feedbackList');
            list.innerHTML = '';
            data.feedback.forEach(item => {
                let li = document.createElement
